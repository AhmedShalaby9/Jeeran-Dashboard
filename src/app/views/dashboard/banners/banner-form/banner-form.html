<div class="page">

  <div class="page-header">
    <div class="header-left">
      <button class="btn-back" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>
      <div>
        <h1>New Banner</h1>
        <p>Create a new promotional banner</p>
      </div>
    </div>
  </div>

  <div class="error-msg" *ngIf="errorMessage">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ errorMessage }}
  </div>

  <form class="form-card" (ngSubmit)="onSubmit()">

    <div class="form-section">
      <h2 class="section-title">Banner Image</h2>
      <p class="section-desc">Provide the banner image URL.</p>

      <div class="form-group">
        <label>Image URL <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.image_url" name="image_url"
          placeholder="https://example.com/banner.jpg" />
      </div>

      <!-- Image Preview -->
      <div class="image-preview" *ngIf="form.image_url">
        <span class="preview-tag">Preview</span>
        <img [src]="form.image_url" alt="banner preview" class="preview-img"
          (error)="$any($event.target).style.display='none'" />
      </div>
    </div>

    <div class="form-divider"></div>

    <div class="form-section">
      <h2 class="section-title">Settings</h2>

      <div class="form-row">
        <div class="form-group">
          <label>Link URL</label>
          <input type="text" [(ngModel)]="form.link" name="link"
            placeholder="https://example.com" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" [(ngModel)]="form.phone" name="phone"
            placeholder="+20 100 000 0000" />
        </div>
        <div class="form-group check-group">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="form.is_active" name="is_active" />
            <span>Active</span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-divider"></div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="goBack()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Create Banner</span>
        <span *ngIf="isSubmitting" class="spinner-sm"></span>
      </button>
    </div>

  </form>
</div>
